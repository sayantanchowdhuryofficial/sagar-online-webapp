<!DOCTYPE html>
<html>

<head>

<title>SAGAR ONLINE</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="sidebar" id="sidebar">

<h2>SAGAR ONLINE</h2>

<ul>

<li onclick="openPage('dashboard')">Dashboard</li>
<li onclick="openPage('stock')">Product Stock</li>
<li onclick="openPage('billing')">Billing</li>
<li onclick="openPage('report')">Sale Report</li>
<li onclick="openPage('due')">Due Register</li>

</ul>

</div>

<div class="content">

<!-- DASHBOARD -->

<div id="dashboard" class="page">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Products</h3>
<p id="totalProducts">0</p>
</div>

<div class="card">
<h3>Low Stock</h3>
<p id="lowStock">0</p>
</div>

</div>

<canvas id="stockChart"></canvas>

</div>

<!-- STOCK -->

<div id="stock" class="page">

<h1>Stock Manager</h1>

<input id="pname" placeholder="Product Name">
<input id="pqty" placeholder="Quantity">
<input id="pcat" placeholder="Category">
<input id="plow" placeholder="Low Alert Count">

<button onclick="addProduct()">Add Product</button>

<table id="productTable"></table>

</div>

<!-- BILLING -->

<div id="billing" class="page">

<h1>Billing</h1>

<input id="bproduct" placeholder="Product Name">
<input id="bcustomer" placeholder="Customer Name">
<input id="bmobile" placeholder="Mobile">
<input id="bqty" placeholder="Quantity">
<input id="bprice" placeholder="Total Amount">

<button onclick="createBill()">Generate Bill</button>

</div>

<!-- REPORT -->

<div id="report" class="page">

<h1>Sale Report</h1>
<p>Coming Soon</p>

</div>

<!-- DUE -->

<div id="due" class="page">

<h1>Due Register</h1>

<input id="dname" placeholder="Customer Name">
<input id="ddate" placeholder="Due Date">
<input id="damount" placeholder="Amount">

<button onclick="addDue()">Add Due</button>

<table id="dueTable"></table>

</div>

</div>

<script src="js/app.js"></script>
<script src="js/stock.js"></script>
<script src="js/billing.js"></script>
<script src="js/due.js"></script>

</body>
</html>
