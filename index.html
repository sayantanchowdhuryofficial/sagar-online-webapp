<!DOCTYPE html>
<html>

<head>

<title>SAGAR ONLINE</title>

<link rel="stylesheet" href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="menu-btn" onclick="toggleMenu()">
<div></div>
<div></div>
<div></div>
</div>

<div class="sidebar" id="sidebar">

<h2>SAGAR ONLINE</h2>

<ul>

<li onclick="showPage('dashboard')">Dashboard</li>

<li onclick="showPage('product')">Product Date</li>

<li onclick="showPage('billing')">Billing</li>

<li onclick="showPage('sale')">Sale Report</li>

<li onclick="showPage('due')">Due Register</li>

</ul>

</div>

<div class="content">

<div id="dashboard" class="page">

<h1>Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Products</h3>
<p id="totalProducts">0</p>
</div>

<div class="card">
<h3>Low Stock</h3>
<p id="lowStock">0</p>
</div>

</div>

<canvas id="stockChart"></canvas>

</div>

<div id="product" class="page">

<h1>Product Entry</h1>

<input id="pname" placeholder="Product Name">

<input id="pqty" placeholder="Quantity">

<input id="pcat" placeholder="Category">

<button onclick="addProduct()">Add Product</button>

<table id="productTable"></table>

</div>

<div id="billing" class="page">

<h1>Billing</h1>

<input id="bpname" placeholder="Product">

<input id="bcustomer" placeholder="Customer Name">

<input id="bmobile" placeholder="Mobile">

<input id="bqty" placeholder="Quantity">

<input id="bamount" placeholder="Amount">

<button onclick="generateBill()">Generate Bill</button>

</div>

<div id="sale" class="page">

<h1>Sale Report</h1>

<p>Coming Soon</p>

</div>

<div id="due" class="page">

<h1>Due Register</h1>

<input id="dname" placeholder="Customer Name">

<input id="ddate" placeholder="Due Date">

<input id="damount" placeholder="Amount">

<button onclick="addDue()">Add Due</button>

<table id="dueTable"></table>

</div>

</div>

<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/billing.js"></script>
<script src="js/due.js"></script>

</body>

</html>
